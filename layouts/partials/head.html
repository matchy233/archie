<header>
  <div class="header">
    <div class="main">
      <a href="{{ .Site.BaseURL }}">{{ .Site.Title }}</a>
    </div>
    <nav>
      {{ range $index, $elem := .Site.Menus.main }}
      <span>
        <a href="{{ .URL }}">{{ .Name }}</a>
        <!-- add "|" if not last item -->
        {{ if ne $index (sub (len $.Site.Menus.main) 1) }} | {{ end }}
      </span>
      {{ end }}
      {{ if eq .Site.Params.mode "toggle" -}}
      <span> | </span>
      <span id="dark-mode-toggle" onclick="toggleTheme()" class="toggle-btn" />
      <script src="{{ .Site.BaseURL }}js/themetoggle.js"></script>
      {{ end }}
    </nav>
  </div>
</header>
